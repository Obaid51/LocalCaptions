name: "🐛 Bug report"
description: Something isn't working as expected (not a capture/selector issue).
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    attributes:
      label: Browser & version
      placeholder: e.g. Edge 139 on macOS 14
    validations:
      required: true
  - type: textarea
    attributes:
      label: Console errors (if any)
      render: shell
